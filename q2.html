<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts AutoSkip Promo Image 2 (Zoomed)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Sans KR', sans-serif;
        }

        #promo-canvas {
            width: 1280px;
            height: 800px;
            /* 배경은 사용자 스크린샷처럼 아주 옅은 핑크톤으로 설정 */
            background: linear-gradient(135deg, #FFF0F0 0%, #FFE5E5 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            transform-origin: center center;
        }

        /* 꽉 찬 레이아웃을 위한 커스텀 토글 스위치 (크기 확대 버전) */
        .toggle-checkbox:checked {
            right: 4px;
            border-color: #FF0000;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #FF0000;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
    <script>
        function resizeCanvas() {
            const canvas = document.getElementById('promo-canvas');
            const scaleX = window.innerWidth / 1280;
            const scaleY = window.innerHeight / 800;
            const scale = Math.min(scaleX, scaleY, 1);
            if (scale < 1) {
                canvas.style.transform = `scale(${scale * 0.95})`;
            } else {
                canvas.style.transform = `scale(1)`;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('DOMContentLoaded', resizeCanvas);

        async function downloadPromoImage() {
            const canvasElement = document.getElementById('promo-canvas');
            const btn = document.getElementById('download-btn');
            
            const originalText = btn.innerHTML;
            btn.innerHTML = '<svg class="w-5 h-5 mr-2 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 캡처 중...';
            
            const currentTransform = canvasElement.style.transform;
            canvasElement.style.transform = 'scale(1)';

            try {
                const canvas = await html2canvas(canvasElement, {
                    width: 1280,
                    height: 800,
                    scale: 1, 
                    useCORS: true,
                    backgroundColor: '#FFF0F0'
                });

                const link = document.createElement('a');
                link.download = 'Shorts_AutoSkip_Promo_Zoomed_1280x800.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (error) {
                alert('이미지 저장 중 오류가 발생했습니다.');
                console.error(error);
            } finally {
                canvasElement.style.transform = currentTransform;
                btn.innerHTML = originalText;
            }
        }
    </script>
</head>
<body>

    <!-- 프로모션 캔버스 (1280x800) -->
    <div id="promo-canvas" class="text-gray-900">
        
        <!-- 데스크탑 브라우저 창 목업 (초대형 스케일) -->
        <div class="absolute w-[1400px] h-[1000px] bg-white rounded-[2rem] border-2 border-gray-200 shadow-2xl flex flex-col overflow-hidden top-[40px] left-[80px]">
            
            <!-- 브라우저 상단 탭바 -->
            <div class="h-20 bg-gray-50 flex items-center px-8 border-b border-gray-200 relative">
                <div class="flex space-x-3 absolute left-8">
                    <div class="w-5 h-5 rounded-full bg-red-500"></div>
                    <div class="w-5 h-5 rounded-full bg-yellow-500"></div>
                    <div class="w-5 h-5 rounded-full bg-green-500"></div>
                </div>
                <!-- 주소창 -->
                <div class="mx-auto w-[40%] bg-white border border-gray-200 rounded-xl text-lg text-gray-500 px-6 py-3 flex items-center shadow-sm">
                    <i data-lucide="lock" class="w-5 h-5 mr-3"></i> youtube.com/shorts
                </div>
                <!-- 확장프로그램 영역 -->
                <div class="absolute right-10 flex items-center space-x-6">
                    <i data-lucide="puzzle" class="w-7 h-7 text-gray-500"></i>
                    <div class="w-12 h-12 bg-red-50 rounded-lg border border-red-200 flex items-center justify-center relative">
                        <i data-lucide="fast-forward" class="w-6 h-6 text-[#FF0000]"></i>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-gray-300"></div>
                </div>
            </div>

            <!-- 유튜브 데스크탑 레이아웃 목업 -->
            <div class="flex-1 bg-white flex relative overflow-hidden">
                <!-- 좌측 사이드바 -->
                <div class="w-[140px] h-full border-r border-gray-100 flex flex-col items-center py-8 space-y-12 bg-white shrink-0">
                    <i data-lucide="menu" class="w-8 h-8 text-gray-800 mb-4"></i>
                    
                    <div class="flex flex-col items-center group cursor-pointer">
                        <i data-lucide="home" class="w-9 h-9 text-gray-800 stroke-[1.5]"></i>
                        <span class="text-sm mt-2 text-gray-600">홈</span>
                    </div>
                    
                    <div class="flex flex-col items-center relative cursor-pointer">
                        <!-- 유튜브 쇼츠 아이콘 (순수 빨간색) -->
                        <svg class="w-10 h-10 text-[#FF0000]" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.77,10.32l-1.2-.5L18,9.06a3.74,3.74,0,0,0-3.5-6.62L6,6.94a3.74,3.74,0,0,0,.23,6.74l1.2.49L6,14.93a3.75,3.75,0,0,0,3.5,6.63l8.5-4.5a3.74,3.74,0,0,0-.23-6.74Z"/>
                            <polygon fill="#FFFFFF" points="10 14.65 15 12 10 9.35 10 14.65"/>
                        </svg>
                        <span class="text-sm mt-2 font-bold text-gray-900">Shorts</span>
                    </div>

                    <div class="flex flex-col items-center cursor-pointer">
                        <i data-lucide="tv" class="w-9 h-9 text-gray-800 stroke-[1.5]"></i>
                        <span class="text-sm mt-2 text-gray-600">구독</span>
                    </div>
                </div>

                <!-- 쇼츠 메인 플레이어 영역 -->
                <div class="flex-1 bg-gray-50 p-12 relative">
                    <div class="w-[500px] h-[850px] bg-black rounded-[2rem] relative overflow-hidden shadow-xl border border-gray-200 text-white">
                        <!-- 확실한 힐링 자연 풍경 이미지 -->
                        <div class="absolute inset-0 bg-cover bg-center opacity-90" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=800&auto=format&fit=crop');"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        
                        <!-- 데스크탑 쇼츠 내부 UI -->
                        <div class="absolute left-6 bottom-8 right-6">
                            <div class="flex items-center space-x-3 mb-4">
                                <div class="w-12 h-12 bg-gray-400 rounded-full border border-gray-300 bg-[url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=150&auto=format&fit=crop')] bg-cover"></div>
                                <span class="font-bold text-lg">힐링자연</span>
                                <button class="bg-white text-black px-4 py-1.5 rounded-full text-sm font-bold ml-2">구독</button>
                            </div>
                            <p class="text-base line-clamp-2 text-gray-100">마음이 편안해지는 풍경입니다 🌿 다 보면 다음으로 알아서 슉! #shorts #자연</p>
                        </div>
                        
                        <!-- 프로그레스 바 -->
                        <div class="absolute bottom-0 left-0 right-0 h-2 bg-gray-500/50">
                            <div class="h-full bg-[#FF0000] w-[75%] relative"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 시선을 끄는 붉은 점선 화살표 (Shorts 메뉴를 향함) -->
        <div class="absolute left-[8px] top-[325px] z-30">
            <svg width="120" height="60" viewBox="0 0 120 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 10 30 Q 50 30 100 30" stroke="#FF0000" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10" fill="none"/>
                <path d="M 90 15 L 115 30 L 90 45" stroke="#FF0000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
        </div>

        <!-- 초대형 익스텐션 팝업 UI (화면 우측 꽉 차게 강조) -->
        <div class="absolute top-[100px] right-[60px] w-[560px] bg-white rounded-3xl border-[6px] border-[#FF0000] shadow-[0_30px_60px_rgba(255,0,0,0.3)] z-40 overflow-hidden transform -rotate-1 hover:rotate-0 transition-transform duration-500">
            <!-- 팝업 헤더 -->
            <div class="bg-gray-50 px-8 py-6 border-b border-gray-200 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-14 h-14 bg-[#FF0000] rounded-2xl flex items-center justify-center shadow-md">
                        <i data-lucide="fast-forward" class="w-8 h-8 text-white"></i>
                    </div>
                    <span class="font-black text-3xl text-gray-900 tracking-tight">Shorts AutoSkip</span>
                </div>
                <i data-lucide="settings" class="w-8 h-8 text-gray-400"></i>
            </div>
            
            <!-- 팝업 본문 -->
            <div class="p-10 space-y-10">
                <!-- 기능 1: 자동 넘기기 토글 -->
                <div class="flex justify-between items-center">
                    <div>
                        <div class="font-bold text-3xl text-gray-900 mb-2">자동 넘기기</div>
                        <div class="text-xl text-gray-500">쇼츠가 끝나면 다음으로 이동</div>
                    </div>
                    <!-- 대형 커스텀 토글 -->
                    <div class="relative inline-block w-24 h-12 align-middle select-none">
                        <input type="checkbox" name="toggle" id="toggle_large" class="toggle-checkbox absolute block w-10 h-10 rounded-full bg-white border-[4px] appearance-none cursor-pointer z-10 top-1 right-1 border-[#FF0000] transition-all duration-300" checked/>
                        <label for="toggle_large" class="toggle-label block overflow-hidden h-12 rounded-full bg-[#FF0000] cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>
                
                <div class="h-[2px] bg-gray-100 w-full"></div>

                <!-- 기능 2: 반복 횟수 설정 -->
                <div class="flex justify-between items-center">
                    <div>
                        <div class="font-bold text-3xl text-gray-900 mb-2">반복 재생</div>
                        <div class="text-xl text-gray-500">설정한 횟수만큼 반복 후 넘김</div>
                    </div>
                    <div class="flex items-center space-x-3 bg-gray-50 rounded-2xl p-2 border border-gray-200 shadow-inner">
                        <button class="w-12 h-12 flex items-center justify-center text-gray-500 hover:text-gray-900 shadow-sm rounded-xl bg-white border border-gray-100"><i data-lucide="minus" class="w-6 h-6"></i></button>
                        <span class="w-12 text-center font-black text-3xl text-gray-900">1</span>
                        <button class="w-12 h-12 flex items-center justify-center text-gray-500 hover:text-gray-900 shadow-sm rounded-xl bg-white border border-gray-100"><i data-lucide="plus" class="w-6 h-6"></i></button>
                    </div>
                </div>
            </div>
            
            <!-- 팝업 하단 푸터 -->
            <div class="bg-red-50 py-5 border-t border-red-100 text-center text-xl text-[#FF0000] font-bold flex justify-center items-center">
                <div class="w-3 h-3 rounded-full bg-[#FF0000] mr-3 animate-pulse shadow-[0_0_10px_rgba(255,0,0,0.8)]"></div>
                현재 작동 중
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>

    <!-- 우측 하단 다운로드 플로팅 버튼 -->
    <button id="download-btn" onclick="downloadPromoImage()" class="fixed bottom-8 right-8 bg-[#FF0000] hover:bg-red-700 text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center transition-colors z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        1280x800 이미지로 저장
    </button>

</body>
</html>
