<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Shorts AutoSkip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    *,::after,::before { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background-color: #aaaaaa33; }
    ::-webkit-scrollbar-corner { background-color: transparent; }
    ::-webkit-scrollbar-button { display: none; }
    ::-webkit-scrollbar-thumb { width: 10px; border-radius: 7px; background-color: #aaaaaa55; border: solid 3px transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: #aaaaaa66; }
    body {min-width: 360px;min-height: 300px;font-family:'Roboto', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;background: #f7f7f7;color: #111;}
    .wrap{max-width: 360px;margin: auto;display: flex;flex-direction: column;height: 100dvh;background: #ffffff;border: #dddddd solid 1px;}
    .main{flex:1;display: flex;flex-direction: column;padding: 10px 20px 0px 20px;overflow-y: auto;}

    /* 헤더 */
    .header   {display: flex;align-items: center;justify-content: space-between;padding: 15px 20px 15px 20px;background: #f7f7f7;border-bottom: #dddddd solid 1px;}
    .title    {font-size: 15px;font-weight: 700;color: #333333;text-decoration: none;margin-left: -4px;}
    .icon     {width: 24px;height: 24px;margin-top: -2px;margin-right: 6px;vertical-align: middle;}
    .lang-btn {font-size: 11px;color: #888;cursor: pointer;border: 1px solid #c5c5c5;border-radius: 4px;padding: 2px 8px;background: none;}
    .lang-btn:hover {background: #ffffff;}

    /* 설정 행 */
    .row      {display: flex;align-items: center;justify-content: space-between;padding: 13px 0;}
    .row:not(:last-child) {border-bottom: 1px solid #d1d1d1;}
    .label    {font-size: 14px;color: #222;}
    .sublabel {font-size: 14px;color: #4b4b4b;margin-top: 3px;}
    [for="enableToggle"] {cursor:pointer}

    /* 토글 스위치 */
    .toggle          {position: relative;width: 40px;height: 24px;}
    .toggle input    { opacity: 0; width: 0; height: 0; }
    .slider          {position: absolute;inset: 0;background: #b5b5b5;border: #939393 solid 1px;border-radius: 22px;cursor: pointer;}
    .slider:before   {content: '';position: absolute;width: 16px;height: 16px;left: 3px;top: 3px;background: #ffffff;border: #979797 solid 1px;border-radius: 50%;box-sizing: border-box;}
    body.load .slider::before{transition: all 0.2s ease;}
    input:checked + .slider        {background: #ff0000;border-color: #cf3232;}
    input:checked + .slider:before {transform: translateX(17px);border-color: #ffffff;}

    /* 횟수 조절 */
    .count-ctrl {display: flex;align-items: center;gap: 2px;border: #e9e9e9 solid 1px;background: #f7f7f7;padding: 3px;border-radius: 6px;}
    .count-btn  {width: 26px;height: 26px;border: 1px solid #ebebeb;border-radius: 6px;background: #ffffff;font-size: 16px;cursor: pointer;color: #333;display: flex;align-items: center;justify-content: center;}
    .count-btn:hover {border-color: #d1d1d1;}
    .count-num  {font-size: 14px;font-weight: 500;min-width: 20px;text-align: center;}

    /* 푸터 */
    .footer { text-align: center;font-size: 13px;color: #858585;padding: 10px 20px 10px 20px;border-top: #dddddd solid 1px;}
    .footer a {text-decoration: none;color: #858585;}
    .footer a:hover {text-decoration: underline;}
</style>
</head>
<body>
<div class="wrap">
    <!-- 헤더: 타이틀 + 언어 전환 버튼 -->
    <header class="header">
    <a href="./popup.html" target="_blank" class="title"><img src="./icons/icon128.png" class="icon" alt=""> Shorts AutoSkip</a>
    <button class="lang-btn" id="langBtn"></button>
    </header>
    <main class="main">
        <!-- 자동 넘김 ON/OFF 토글 -->
        <label for="enableToggle" class="row">
        <div>
            <div class="label" id="enableLabel"></div>
            <div class="sublabel" id="enableSub"></div>
        </div>
        <div class="toggle">
            <input type="checkbox" id="enableToggle" />
            <span class="slider"></span>
        </div>
        </label>
        <!-- 반복 횟수 조절 (+/-) -->
        <div class="row">
            <div>
                <div class="label" id="countLabel"></div>
                <div class="sublabel" id="countSub"></div>
            </div>
            <div class="count-ctrl">
                <button class="count-btn" id="minusBtn">-</button>
                <span class="count-num" id="countNum">1</span>
                <button class="count-btn" id="plusBtn">+</button>
            </div>
        </div>
    </main>
    <footer class="footer"><a href="https://www.youtube.com/shorts/" target="_blank" id="footerText"></a></footer>
</div>
<script src="popup.js"></script>
</body>
</html>
