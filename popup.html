<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Shorts AutoSkip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {width: 290px;font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;background: #fff;color: #111;padding: 20px;}

    /* 헤더 */
    .header   { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .title    { font-size: 15px; font-weight: 700; }
    .icon     {width: 24px;height: 24px;margin-top: -2px;margin-right: 6px;vertical-align: middle;}
    .lang-btn {font-size: 11px;color: #888;cursor: pointer;border: 1px solid #c5c5c5;border-radius: 4px;padding: 2px 8px;background: none;}
    .lang-btn:hover { background: #f5f5f5; }

    /* 설정 행 */
    .row      {display: flex;align-items: center;justify-content: space-between;padding: 13px 0;border-bottom: 1px solid #d1d1d1;}
    .label    {font-size: 14px;color: #222;}
    .sublabel {font-size: 13px;color: #4b4b4b;margin-top: 3px;}

    /* 토글 스위치 */
    .toggle          {position: relative;width: 40px;height: 22px;}
    .toggle input    { opacity: 0; width: 0; height: 0; }
    .slider          {position: absolute;inset: 0;background: #858585;border: #858585;border-radius: 22px;cursor: pointer;transition: .2s;}
    .slider:before   {content: '';position: absolute;width: 16px;height: 16px;left: 3px;top: 3px;background: #ffffff;border: #dddddd solid 1px;border-radius: 50%;transition: .2s;box-sizing: border-box;}
    input:checked + .slider        {background: #ff0000;border-color: #ff0000;}
    input:checked + .slider:before {transform: translateX(17px);border-color: #ffffff;}

    /* 횟수 조절 */
    .count-ctrl {display: flex;align-items: center;gap: 10px;border: #e9e9e9 solid 1px;background: #f7f7f7;padding: 3px;border-radius: 6px;}
    .count-btn  {width: 26px;height: 26px;border: 1px solid #ebebeb;border-radius: 6px;background: #fff;font-size: 16px;cursor: pointer;color: #333;display: flex;align-items: center;justify-content: center;}
    .count-btn:hover { background: #f5f5f5; }
    .count-num  { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }

    /* 푸터 */
    .footer {margin-top: 15px;text-align: center;font-size: 12px;color: #4b4b4b;}
  </style>
</head>
<body>
  <!-- 헤더: 타이틀 + 언어 전환 버튼 -->
  <div class="header">
    <span class="title"><img src="./icons/icon48.png" class="icon" alt=""> Shorts AutoSkip</span>
    <button class="lang-btn" id="langBtn">EN</button>
  </div>

  <!-- 자동 넘김 ON/OFF 토글 -->
  <div class="row">
    <div>
      <div class="label" id="enableLabel">자동 넘김</div>
      <div class="sublabel" id="enableSub">쇼츠 자동 넘김 ON/OFF</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- 반복 횟수 조절 (+/-) -->
  <div class="row" style="border-bottom:none">
    <div>
      <div class="label" id="countLabel">반복 횟수</div>
      <div class="sublabel" id="countSub">몇 번 재생 후 넘길까요?</div>
    </div>
    <div class="count-ctrl">
      <button class="count-btn" id="minusBtn">-</button>
      <span class="count-num" id="countNum">1</span>
      <button class="count-btn" id="plusBtn">+</button>
    </div>
  </div>

  <div class="footer" id="footerText">YouTube Shorts 페이지에서만 동작합니다</div>

  <script src="popup.js"></script>
</body>
</html>
