<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Shorts AutoSkip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .title { font-size: 15px; font-weight: 700; }
    .lang-btn {
      font-size: 11px;
      color: #888;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 2px 8px;
      background: none;
    }
    .lang-btn:hover { background: #f5f5f5; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .label { font-size: 13px; color: #222; }
    .sublabel { font-size: 11px; color: #aaa; margin-top: 3px; }

    /* 토글 스위치 */
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ddd;
      border-radius: 22px;
      cursor: pointer;
      transition: .2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }
    input:checked + .slider { background: #ff0000; }
    input:checked + .slider:before { transform: translateX(18px); }

    /* 카운트 컨트롤 */
    .count-ctrl { display: flex; align-items: center; gap: 10px; }
    .count-btn {
      width: 26px; height: 26px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: none;
      font-size: 16px;
      cursor: pointer;
      color: #333;
      display: flex; align-items: center; justify-content: center;
    }
    .count-btn:hover { background: #f5f5f5; }
    .count-num {
      font-size: 16px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">Shorts AutoSkip</span>
    <button class="lang-btn" id="langBtn">EN</button>
  </div>

  <div class="row">
    <div>
      <div class="label" id="enableLabel">자동 넘김</div>
      <div class="sublabel" id="enableSub">쇼츠 자동 넘김 ON/OFF</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="row" style="border-bottom:none">
    <div>
      <div class="label" id="countLabel">반복 횟수</div>
      <div class="sublabel" id="countSub">몇 번 재생 후 넘길까요?</div>
    </div>
    <div class="count-ctrl">
      <button class="count-btn" id="minusBtn">−</button>
      <span class="count-num" id="countNum">2</span>
      <button class="count-btn" id="plusBtn">+</button>
    </div>
  </div>

  <div class="footer" id="footerText">YouTube Shorts 페이지에서만 동작합니다</div>

  <script src="popup.js"></script>
</body>
</html>
